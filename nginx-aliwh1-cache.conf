# =============================================================================
# VRChat BPlayer Proxy — aliWH1 TS Segment Caching (nginx)
# =============================================================================
#
# Architecture:
#   Public user → aliWH1:14515 (this nginx)
#       ├── *.ts  → cache HIT → served from /var/cache/nginx/vrchat
#       │         → cache MISS → 127.0.0.1:14516 (frp) → local machine :14515
#       ├── *.m3u8 → no cache, direct frp tunnel (must stay fresh for live updates)
#       └── other  → direct forward, no cache
#
#   aliWH1 IP:     8.148.64.28 (public), 10.126.126.118 (internal)
#   frps on aliWH1: :7000 (control) + :14516 (tunnel)
#   Local frpc:     connects to aliWH1:7000, creates tunnel :14516 → localhost:14515
# =============================================================================

# ---------------------------------------------------------------------------
# Cache storage definition (http-level directive — define ONCE)
# If proxy_cache_path is already set in /etc/nginx/nginx.conf, remove this block.
# ---------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/vrchat
    levels=1:2
    keys_zone=vrchat_ts:100m
    max_size=50g
    inactive=12h
    use_temp_path=off;

# ---------------------------------------------------------------------------
# Request routing map: decide which requests use the cache
#   .ts files → NOT bypassed (cached)
#   .m3u8 files and everything else → bypass cache entirely
# ---------------------------------------------------------------------------
map $request_uri $vrchat_ts_no_cache {
    "~*\.ts($|\?)"  0;     # .ts or .ts?query → cache allowed
    default          1;     # .m3u8, other → bypass cache
}

# ---------------------------------------------------------------------------
# Server block — listens on port 14515, proxies to frp tunnel on 14516
# ---------------------------------------------------------------------------
server {
    listen 14515;
    server_name 8.148.64.28 10.126.126.118 localhost;

    # ---- Base proxy settings ----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    # ---- CORS headers (VRChat players need these) ----
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
    add_header Access-Control-Allow-Headers "*" always;

    # ---- Cache status debug header ----
    add_header X-Proxy-Cache $upstream_cache_status always;

    # ---- Handle OPTIONS preflight ----
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        # ---- Upstream: frp tunnel to local machine ----
        proxy_pass http://127.0.0.1:14516;

        # ---- TS segment caching ----
        proxy_cache vrchat_ts;
        proxy_cache_key "$request_uri";
        proxy_cache_valid 200 12h;
        proxy_cache_valid any 0;                     # Don't cache non-200
        proxy_cache_use_stale error timeout updating
                            http_500 http_502 http_503 http_504;
        proxy_cache_lock on;                         # Single request per cache key
        proxy_cache_lock_timeout 30s;
        proxy_cache_revalidate on;                   # Conditional refresh (If-Modified-Since)
        proxy_cache_background_update on;            # Serve stale while refreshing
        proxy_cache_bypass $vrchat_ts_no_cache;      # Skip cache for non-.ts requests
        proxy_no_cache $vrchat_ts_no_cache;          # Don't store non-.ts responses

        # ---- Buffer settings ----
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_temp_file_write_size 128k;
        proxy_max_temp_file_size 0;

        # ---- Timeouts (frp tunnel can be slow on first-segment delivery) ----
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # ---- Retry on upstream failure ----
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 30s;
    }
}
